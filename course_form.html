{% extends "base.html" %}
{% block title %}{{ action }} Course{% endblock %}
{% block content %}

<h2>{{ action }} Course</h2>

<form method="POST" class="row g-3 mt-2" novalidate>
    <div class="col-md-8">
        <label class="form-label">Course Name <span class="text-danger">*</span></label>
        <input type="text" name="course_name" class="form-control" required
               value="{{ course.course_name if course else '' }}">
    </div>

    <div class="col-md-4">
        <label class="form-label">Credits <span class="text-danger">*</span></label>
        <input type="number" name="credits" class="form-control" min="1" required
               value="{{ course.credits if course else '' }}">
    </div>

    <div class="col-12 mt-4">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('list_courses') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

{% endblock %}
