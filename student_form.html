{% extends "base.html" %}
{% block title %}{{ action }} Student{% endblock %}
{% block content %}

<h2>{{ action }} Student</h2>

<form method="POST" class="row g-3 mt-2" novalidate>
    <div class="col-md-6">
        <label class="form-label">Name <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" required
               value="{{ student.name if student else '' }}">
    </div>

    <div class="col-md-6">
        <label class="form-label">Email <span class="text-danger">*</span></label>
        <input type="email" name="email" class="form-control" required
               value="{{ student.email if student else '' }}">
    </div>

    <div class="col-md-6">
        <label class="form-label">Mobile</label>
        <input type="text" name="mobile" class="form-control"
               value="{{ student.mobile if student else '' }}">
    </div>

    <div class="col-md-6">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select">
            <option value="">-- Select --</option>
            {% set g = student.gender if student else '' %}
            <option value="Male" {% if g == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if g == 'Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if g == 'Other' %}selected{% endif %}>Other</option>
        </select>
    </div>

    <div class="col-md-12">
        <label class="form-label">Address</label>
        <input type="text" name="address" class="form-control"
               value="{{ student.address if student else '' }}">
    </div>

    <div class="col-md-6">
        <label class="form-label">Birthday</label>
        <input type="date" name="birthday" class="form-control"
               value="{{ student.birthday if student else '' }}">
    </div>

    <div class="col-12 mt-4">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('list_students') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

{% endblock %}
