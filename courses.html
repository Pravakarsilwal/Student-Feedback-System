{% extends "base.html" %}
{% block title %}Courses{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Courses</h2>
    <a href="{{ url_for('add_course') }}" class="btn btn-success">+ Add Course</a>
</div>

<div class="table-responsive">
<table class="table table-striped table-bordered align-middle">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Course Name</th>
            <th>Credits</th>
            <th style="width: 160px;">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for c in courses %}
        <tr>
            <td>{{ c.course_id }}</td>
            <td>{{ c.course_name }}</td>
            <td>{{ c.credits }}</td>
            <td>
                <a href="{{ url_for('edit_course', course_id=c.course_id) }}" class="btn btn-sm btn-warning">Edit</a>
                <form action="{{ url_for('delete_course', course_id=c.course_id) }}" method="POST" class="d-inline"
                      onsubmit="return confirm('Are you sure you want to delete this course? This will also delete related feedback.');">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="4" class="text-center">No courses found.</td></tr>
        {% endfor %}
    </tbody>
</table>
</div>

{% endblock %}
